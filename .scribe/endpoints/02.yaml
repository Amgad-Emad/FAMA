name: 'Admin authentication'
description: |-

  Token auth for the `admin` (staff) guard: login/logout/refresh/me plus
  provisioning of new staff. Admin tokens carry the `admin` ability AND the
  admin's granular spatie permissions (manage-flows, moderate-content, …) as
  abilities, so future admin API routes can gate with `abilities:<permission>`.
  There is deliberately no public admin sign-up — staff are provisioned by an
  existing admin holding `manage-users`.
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/admin/login
    metadata:
      custom: []
      groupName: 'Admin authentication'
      groupDescription: |-

        Token auth for the `admin` (staff) guard: login/logout/refresh/me plus
        provisioning of new staff. Admin tokens carry the `admin` ability AND the
        admin's granular spatie permissions (manage-flows, moderate-content, …) as
        abilities, so future admin API routes can gate with `abilities:<permission>`.
        There is deliberately no public admin sign-up — staff are provisioned by an
        existing admin holding `manage-users`.
      subgroup: ''
      subgroupDescription: ''
      title: 'Authenticate credentials and issue an ability-scoped token.'
      description: |-
        Throttled by the route middleware; credentials are verified against the
        entity model (constant-time hash check) with a single generic error to
        avoid leaking which half was wrong.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        custom: []
        name: email
        description: 'Must be a valid email address.'
        required: true
        example: gbailey@example.net
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: ''
        required: true
        example: '|]|{+-'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      device_name:
        custom: []
        name: device_name
        description: 'Must not be greater than 255 characters.'
        required: false
        example: v
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      email: gbailey@example.net
      password: '|]|{+-'
      device_name: v
    fileParameters: []
    responses: []
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
