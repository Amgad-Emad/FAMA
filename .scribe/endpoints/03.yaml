name: Discovery
description: |-

  Public, read-only talent discovery for the mobile app — the same
  spatie/laravel-query-builder search the web feed uses, so filters and sorting
  stay identical across web and API. Published talents only.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/talents
    metadata:
      custom: []
      groupName: Discovery
      groupDescription: |-

        Public, read-only talent discovery for the mobile app — the same
        spatie/laravel-query-builder search the web feed uses, so filters and sorting
        stay identical across web and API. Published talents only.
      subgroup: ''
      subgroupDescription: ''
      title: 'List talents'
      description: |-
        Paginated, filterable discovery feed. Supply `filter[...]` params
        (type, category, availability, city, country, equipment, software, q) and
        `sort` (view_count, created_at) exactly as the web feed does.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      'filter[type]':
        custom: []
        name: 'filter[type]'
        description: 'Comma-separated profession slugs.'
        required: false
        example: photographer
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'filter[city]':
        custom: []
        name: 'filter[city]'
        description: 'Partial city match.'
        required: false
        example: Cairo
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'filter[availability]':
        custom: []
        name: 'filter[availability]'
        description: 'One of available, booked, unavailable.'
        required: false
        example: available
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'filter[q]':
        custom: []
        name: 'filter[q]'
        description: 'Free-text display-name match.'
        required: false
        example: amgad
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      sort:
        custom: []
        name: sort
        description: 'view_count or created_at (prefix with - for descending).'
        required: false
        example: '-view_count'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      page:
        custom: []
        name: page
        description: 'The page number.'
        required: false
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
      'filter[type]': photographer
      'filter[city]': Cairo
      'filter[availability]': available
      'filter[q]': amgad
      sort: '-view_count'
      page: 1
