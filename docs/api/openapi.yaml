                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: ''
                  example: architecto
                roles:
                  type: array
                  description: 'Must match an existing stored value.'
                  example:
                    - architecto
                  items:
                    type: string
              required:
                - name
                - email
                - password
  /api/v1/talents:
    get:
      summary: 'List talents'
      operationId: listTalents
      description: "Paginated, filterable discovery feed. Supply `filter[...]` params\n(type, category, availability, city, country, equipment, software, q) and\n`sort` (view_count, created_at) exactly as the web feed does."
      parameters:
        -
          in: query
          name: 'filter[type]'
          description: 'Comma-separated profession slugs.'
          example: photographer
          required: false
          schema:
            type: string
            description: 'Comma-separated profession slugs.'
            example: photographer
        -
          in: query
          name: 'filter[city]'
          description: 'Partial city match.'
          example: Cairo
          required: false
          schema:
            type: string
            description: 'Partial city match.'
            example: Cairo
        -
          in: query
          name: 'filter[availability]'
          description: 'One of available, booked, unavailable.'
          example: available
          required: false
          schema:
            type: string
            description: 'One of available, booked, unavailable.'
            example: available
        -
          in: query
          name: 'filter[q]'
          description: 'Free-text display-name match.'
          example: amgad
          required: false
          schema:
            type: string
            description: 'Free-text display-name match.'
            example: amgad
        -
          in: query
          name: sort
          description: 'view_count or created_at (prefix with - for descending).'
          example: '-view_count'
          required: false
          schema:
            type: string
            description: 'view_count or created_at (prefix with - for descending).'
            example: '-view_count'
        -
          in: query
          name: page
          description: 'The page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'The page number.'
            example: 1
