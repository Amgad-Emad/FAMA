  /api/v1/admin/register:
    post:
      summary: 'Provision an admin'
      operationId: provisionAnAdmin
      description: "Create a new staff account with optional roles. Restricted to an\nauthenticated admin holding `manage-users`; audited with the acting admin\nas causer. Returns the created admin (no token — the new admin logs in\nthemselves)."
      parameters: []
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 2
                    name: Mod
                    email: mod@fama.test
                    roles:
