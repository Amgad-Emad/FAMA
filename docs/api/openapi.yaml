openapi: 3.0.3
info:
  title: 'FAMA API Documentation'
  description: 'The Fama mobile API (v1) — token-authenticated endpoints for talents, brands and admins, sharing the same services and JSON envelope as the web app.'
  version: 1.0.0
servers:
  - url: 'https://fama.test'
tags:
  - name: 'Talent authentication'
    description: "\nToken auth for the `talent` guard: public sign-up plus the shared\nlogin/logout/refresh/me flow. Issued tokens carry the `talent` ability."
  - name: 'Brand authentication'
    description: "\nToken auth for the `brand` guard: public sign-up plus the shared\nlogin/logout/refresh/me flow. Issued tokens carry the `brand` ability."
  - name: 'Admin authentication'
    description: "\nToken auth for the `admin` (staff) guard: login/logout/refresh/me plus\nprovisioning of new staff. Admin tokens carry the `admin` ability AND the\nadmin's granular spatie permissions (manage-flows, moderate-content, …) as\nabilities, so future admin API routes can gate with `abilities:<permission>`.\nThere is deliberately no public admin sign-up — staff are provisioned by an\nexisting admin holding `manage-users`."
  - name: Discovery
    description: "\nPublic, read-only talent discovery for the mobile app plus the two public\nwrite actions a visitor can take on a profile (leave a review, send a booking\nenquiry) — the same query, services and validation the web pages use.\nPublished talents only."
  - name: Deals
    description: "\nThe authenticated party's view of the shared deal engine. A talent token sees\nthe deals it is party to; a brand token sees the deals it initiated/received.\nRead-only here — step actions (advance/reject/message) stay on the web deal\nroom for now and are a later API slice."
  - name: 'Admin (lite)'
    description: ''
  - name: 'Brand · Account'
    description: ''
  - name: 'Brand · Campaigns'
    description: ''
  - name: 'Brand · Creative needs'
    description: ''
  - name: 'Brand · Credibility'
    description: ''
  - name: 'Brand · Deals'
    description: ''
  - name: 'Brand · Discovery'
    description: ''
  - name: 'Brand · Enquiries'
    description: ''
  - name: 'Brand · Onboarding'
    description: ''
  - name: 'Brand · Profile'
    description: ''
  - name: 'Brand · Reviews'
    description: ''
  - name: Notifications
    description: ''
  - name: 'Reference / lookups'
    description: "\nPublic catalog data the mobile app needs to render dynamic UI (dropdowns,\nprofession pickers, the block catalog, the deal flows on offer). Read-only and\nunauthenticated — onboarding forms need these before a token exists.\nTranslatable names come back in the request locale (Accept-Language)."
  - name: 'Talent · Account'
    description: ''
  - name: 'Talent · Affiliations'
    description: ''
  - name: 'Talent · Availability'
    description: ''
  - name: 'Talent · Comp card'
    description: ''
  - name: 'Talent · Content'
    description: ''
  - name: 'Talent · Deals'
    description: ''
  - name: 'Talent · Enquiries'
    description: ''
  - name: 'Talent · Press'
    description: ''
  - name: 'Talent · Professions'
    description: ''
  - name: 'Talent · Profile'
    description: ''
  - name: 'Talent · Reviews'
    description: ''
  - name: 'Talent · Services'
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token from one of the <b>login</b> or <b>register</b> endpoints, then send it as <code>Authorization: Bearer {token}</code>. Tokens are ability-scoped to the entity (talent / brand / admin) they belong to.'
security:
  -
    default: []
paths:
  /api/v1/talent/register:
    post:
      summary: 'Register a talent'
      operationId: registerATalent
      description: "Create a new talent account and return an ability-scoped token. The\nprofile starts unpublished; the public slug is generated by the model."
      parameters: []
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    token: 1|xxxx
                    token_type: Bearer
                    abilities:
                      - talent
                    talent:
                      id: 1
                      slug: amgad-emad-ab12cd
                      display_name: 'Amgad Emad'
                  message: null
                  errors: null
                  meta: null
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|xxxx
                      token_type:
                        type: string
                        example: Bearer
                      abilities:
                        type: array
                        example:
                          - talent
                        items:
                          type: string
                      talent:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          slug:
                            type: string
                            example: amgad-emad-ab12cd
                          display_name:
                            type: string
                            example: 'Amgad Emad'
                  message:
                    type: string
                    example: null
                    nullable: true
                  errors:
                    type: string
                    example: null
                    nullable: true
                  meta:
                    type: string
                    example: null
                    nullable: true
      tags:
        - 'Talent authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: ''
                  example: architecto
                device_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
              required:
                - display_name
                - email
                - password
      security: []
  /api/v1/talent/login:
    post:
      summary: 'Authenticate credentials and issue an ability-scoped token.'
      operationId: authenticateCredentialsAndIssueAnAbilityScopedToken
      description: "Throttled by the route middleware; credentials are verified against the\nentity model (constant-time hash check) with a single generic error to\navoid leaking which half was wrong."
      parameters: []
      responses: {}
      tags:
        - 'Talent authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
                device_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: v
              required:
                - email
                - password
      security: []
  /api/v1/talent/me:
    get:
      summary: "Return the authenticated entity (the token's tokenable)."
      operationId: returnTheAuthenticatedEntitytheTokensTokenable
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  data: null
                  message: Unauthenticated.
                  errors: null
                  meta: null
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: Unauthenticated.
                  errors:
                    type: string
                    example: null
                    nullable: true
                  meta:
                    type: string
                    example: null
                    nullable: true
      tags:
        - 'Talent authentication'
  /api/v1/talent/refresh:
    post:
      summary: "Rotate the caller's token: revoke the one presented and issue a fresh\nability-scoped replacement. Sanctum tokens don't expire on their own, so\nrotation is how a client renews a credential it wants to cycle."
      operationId: rotateTheCallersTokenRevokeTheOnePresentedAndIssueAFreshAbilityScopedReplacementSanctumTokensDontExpireOnTheirOwnSoRotationIsHowAClientRenewsACredentialItWantsToCycle
      description: ''
      parameters: []
      responses: {}
      tags:
        - 'Talent authentication'
  /api/v1/talent/logout:
    post:
      summary: 'Revoke the token presented with the request (single-device logout).'
      operationId: revokeTheTokenPresentedWithTheRequestsingleDeviceLogout
      description: ''
      parameters: []
      responses: {}
      tags:
        - 'Talent authentication'
  /api/v1/brand/register:
    post:
      summary: 'Register a brand'
      operationId: registerABrand
      description: "Create a new brand account and return an ability-scoped token. The account\nstarts incomplete (onboarding gates the discovery feed) and unpublished."
      parameters: []
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    token: 1|xxxx
                    token_type: Bearer
                    abilities:
                      - brand
                    brand:
                      id: 1
                      slug: nomad-coffee-ab12cd
                      name: 'Nomad Coffee'
                  message: null
                  errors: null
                  meta: null
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|xxxx
                      token_type:
                        type: string
                        example: Bearer
                      abilities:
                        type: array
                        example:
                          - brand
                        items:
                          type: string
                      brand:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          slug:
                            type: string
                            example: nomad-coffee-ab12cd
                          name:
                            type: string
                            example: 'Nomad Coffee'
                  message:
                    type: string
                    example: null
                    nullable: true
                  errors:
                    type: string
                    example: null
                    nullable: true
                  meta:
                    type: string
                    example: null
                    nullable: true
      tags:
        - 'Brand authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: ''
                  example: architecto
                device_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
              required:
                - name
                - email
                - password
      security: []
