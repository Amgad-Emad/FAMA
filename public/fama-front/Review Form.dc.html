<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4EDDD; --surface:#FCF8EF; --elevated:#FFFFFF;
  --ink:#1B1813; --muted:#6E665A; --subtle:#9C927F;
  --line:#E5DCCD; --line-strong:#D6CBB7;
  --primary:#1B1813; --on-primary:#F6F1E7;
  --accent:#22608C; --accent-weak:#D9E5EF; --accent-ink:#16405F; --on-accent:#FBF8F0;
  --gold:#B0862F; --gold-weak:#EEE0C2;
  --success:#4E7C59; --success-weak:#DDE8DB;
  --warn:#A87B2C; --warn-weak:#EFE4C8;
  --danger:#B14A3A; --danger-weak:#F0DAD2;
  --focus:rgba(34,96,140,.42);
  --font-head:var(--font-display);
  --r-xs:2px; --r-sm:4px; --r-md:8px; --r-lg:14px; --r-pill:999px;
  --e1:0 1px 2px rgba(27,24,19,.05),0 1px 3px rgba(27,24,19,.04);
  --e2:0 6px 16px -8px rgba(27,24,19,.14),0 2px 6px -3px rgba(27,24,19,.08);
  --e3:0 18px 40px -14px rgba(27,24,19,.20),0 6px 14px -10px rgba(27,24,19,.12);
  --e4:0 36px 80px -24px rgba(27,24,19,.34);
  --dur-1:90ms; --dur-2:160ms; --dur-3:260ms; --dur-4:420ms; --dur-5:680ms;
  --ease-out:cubic-bezier(.16,1,.3,1); --ease-in-out:cubic-bezier(.65,0,.35,1);
  --ease-spring:cubic-bezier(.34,1.4,.64,1); --ease-in:cubic-bezier(.4,0,1,1);
  --font-display:"Bodoni Moda",Georgia,"Times New Roman",serif;
  --font-ui:"IBM Plex Sans","IBM Plex Sans Arabic",system-ui,sans-serif;
  --font-ar:"IBM Plex Sans Arabic","IBM Plex Sans",system-ui,sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,monospace;
}
[data-theme="dark"]{
  --bg:#0E1317; --surface:#151C21; --elevated:#1D262B;
  --ink:#F1E9DA; --muted:#AEA48F; --subtle:#7E7565;
  --line:#28323A; --line-strong:#39454D;
  --primary:#F1E9DA; --on-primary:#1B1813;
  --accent:#5AA6D6; --accent-weak:#153140; --accent-ink:#92C7E8; --on-accent:#0E1317;
  --gold:#CCA45E; --gold-weak:#332913;
  --success:#6FA277; --success-weak:#1E2B20;
  --warn:#CDA04A; --warn-weak:#302813;
  --danger:#D2715F; --danger-weak:#35201B;
  --focus:rgba(90,166,214,.5);
  --e1:0 1px 2px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
  --e2:0 8px 20px -8px rgba(0,0,0,.55),0 2px 6px -3px rgba(0,0,0,.4);
  --e3:0 20px 44px -14px rgba(0,0,0,.6),0 6px 14px -10px rgba(0,0,0,.45);
  --e4:0 40px 90px -24px rgba(0,0,0,.7);
}
[dir="rtl"]{--font-head:var(--font-ar)}
[dir="ltr"]{--font-head:var(--font-display)}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--accent);color:var(--on-accent)}
*{transition-property:transform,box-shadow,opacity,width!important}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
@keyframes popIn{0%{opacity:0;transform:scale(.6)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
</style>
</helmet>
<div data-theme="{{ theme }}" dir="{{ dir }}" style="min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--font-ui)">

  <header style="position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px clamp(16px,4vw,44px);background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-block-end:1px solid var(--line)">
    <div style="display:flex;align-items:baseline;gap:1px"><span style="font-family:var(--font-display);font-weight:600;font-size:24px">Fama</span><span style="color:var(--accent);font-family:var(--font-display);font-weight:600;font-size:24px">.</span></div>
    <nav style="display:flex;align-items:center;gap:6px">
      <div role="group" aria-label="Language" style="display:inline-flex;align-items:center;gap:2px;border:1px solid var(--line-strong);border-radius:var(--r-pill);padding:3px;background:var(--surface)">
        <button type="button" onClick="{{ setEn }}" aria-pressed="{{ isEn }}" style="{{ enBtnStyle }}">EN</button>
        <button type="button" onClick="{{ setAr }}" aria-pressed="{{ isAr }}" style="{{ arBtnStyle }}">ع</button>
      </div>
      <button type="button" onClick="{{ toggleTheme }}" aria-label="{{ s.themeLabel }}" title="{{ s.themeLabel }}" style-hover="border-color:var(--accent);color:var(--accent)" style="width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);border-radius:var(--r-pill);cursor:pointer">
        <span style="position:relative;width:17px;height:17px;display:inline-block"><span style="position:absolute;inset:0;border-radius:var(--r-pill);background:currentColor"></span><sc-if value="{{ isDark }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;top:-3px;inset-inline-end:-4px;width:15px;height:15px;border-radius:var(--r-pill);background:var(--surface)"></span></sc-if></span>
      </button>
    </nav>
  </header>

  <main style="max-width:620px;margin-inline:auto;padding:clamp(28px,5vw,56px) clamp(16px,4vw,32px)">
    <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fadeInUp var(--dur-4) var(--ease-out) both">
        <div style="display:flex;align-items:center;gap:14px;margin-block-end:26px">
          <span style="width:52px;height:52px;border-radius:var(--r-pill);background:var(--accent-weak);color:var(--accent-ink);display:grid;place-items:center;font-family:var(--font-display);font-weight:600;font-size:20px;flex-shrink:0">LM</span>
          <div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-ink)">{{ s.kicker }}</div><h1 style="font-family:var(--font-head);font-weight:500;font-size:clamp(26px,4vw,38px);line-height:1.05;letter-spacing:-.01em;margin:6px 0 0">{{ s.title }}</h1></div>
        </div>
        <p style="font-size:14px;color:var(--muted);line-height:1.6;margin:0 0 30px">{{ s.context }}</p>

        <div style="background:var(--elevated);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--e1);padding:clamp(20px,3vw,30px);display:flex;flex-direction:column;gap:26px">
          <div>
            <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-block-end:10px">{{ s.overall }}</div>
            <div style="display:flex;gap:4px">
              <sc-for list="{{ overallStars }}" as="st" hint-placeholder-count="5"><button type="button" onClick="{{ st.onClick }}" aria-label="{{ st.n }}" style="background:transparent;border:0;cursor:pointer;padding:2px;font-size:32px;line-height:1;{{ st.style }}" style-hover="transform:scale(1.15)">★</button></sc-for>
            </div>
          </div>

          <div style="height:1px;background:var(--line)"></div>

          <div style="display:flex;flex-direction:column;gap:20px">
            <sc-for list="{{ axisGroups }}" as="a" hint-placeholder-count="3">
              <div style="display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;justify-content:space-between">
                <div style="min-width:0"><div style="font-size:15px;font-weight:600">{{ a.label }}</div><div style="font-size:12px;color:var(--muted);margin-block-start:2px">{{ a.note }}</div></div>
                <div style="display:flex;gap:3px">
                  <sc-for list="{{ a.stars }}" as="st" hint-placeholder-count="5"><button type="button" onClick="{{ st.onClick }}" aria-label="{{ st.n }}" style="background:transparent;border:0;cursor:pointer;padding:2px;font-size:22px;line-height:1;{{ st.style }}" style-hover="transform:scale(1.15)">★</button></sc-for>
                </div>
              </div>
            </sc-for>
          </div>

          <div style="height:1px;background:var(--line)"></div>

          <label style="display:flex;flex-direction:column;gap:8px">
            <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)">{{ s.writeLabel }}</span>
            <textarea value="{{ text }}" onChange="{{ onText }}" rows="4" placeholder="{{ s.writePh }}" style="width:100%;background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:12px 14px;font-family:var(--font-ui);font-size:14px;line-height:1.6;color:var(--ink);outline:none;resize:vertical;min-height:104px" style-focus="border-color:var(--accent);box-shadow:0 0 0 3px var(--focus)"></textarea>
          </label>

          <div style="display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between">
            <div><div style="font-size:14px;font-weight:600;margin-block-end:8px">{{ s.workAgain }}</div>
              <div style="display:inline-flex;border:1px solid var(--line-strong);border-radius:var(--r-pill);padding:3px;background:var(--surface)">
                <sc-for list="{{ workItems }}" as="w" hint-placeholder-count="2"><button type="button" onClick="{{ w.onClick }}" style="{{ w.style }}">{{ w.label }}</button></sc-for>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <button type="button" onClick="{{ togglePublic }}" role="switch" aria-checked="{{ publicOn }}" style="{{ switchTrackStyle }}"><span style="{{ switchKnobStyle }}"></span></button>
              <span style="font-size:13px;color:var(--muted)">{{ s.postPublic }}</span>
            </div>
          </div>

          <button type="button" onClick="{{ submit }}" style="background:var(--primary);color:var(--on-primary);border:0;padding:14px;border-radius:var(--r-sm);font-family:var(--font-ui);font-weight:600;font-size:15px;cursor:pointer" style-hover="transform:translateY(-1px);box-shadow:var(--e2)">{{ s.submit }}</button>
          <p style="font-size:12px;color:var(--subtle);text-align:center;margin:0">{{ s.disclaimer }}</p>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
      <div style="background:var(--elevated);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--e2);padding:clamp(32px,5vw,52px);display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;animation:sheetIn var(--dur-4) var(--ease-out) both;margin-block-start:clamp(20px,5vw,60px)">
        <span style="width:64px;height:64px;border-radius:var(--r-pill);background:var(--success);color:#fff;display:grid;place-items:center;font-size:28px;animation:popIn var(--dur-4) var(--ease-spring) both">✓</span>
        <h2 style="font-family:var(--font-head);font-weight:500;font-size:clamp(26px,4vw,34px);margin:0">{{ s.thanksTitle }}</h2>
        <p style="font-size:15px;color:var(--muted);line-height:1.6;margin:0;max-width:38ch">{{ s.thanksBody }}</p>
        <div style="display:flex;gap:10px;margin-block-start:8px">
          <a href="Talent Profile.dc.html" style="background:var(--primary);color:var(--on-primary);border:0;padding:11px 22px;border-radius:var(--r-sm);font-family:var(--font-ui);font-weight:600;font-size:14px;cursor:pointer;text-decoration:none" style-hover="transform:translateY(-1px)">{{ s.viewProfile }}</a>
          <button type="button" onClick="{{ reset }}" style="background:transparent;color:var(--ink);border:1px solid var(--line-strong);padding:11px 20px;border-radius:var(--r-sm);font-family:var(--font-ui);font-weight:600;font-size:14px;cursor:pointer" style-hover="border-color:var(--accent);color:var(--accent-ink)">{{ s.editReview }}</button>
        </div>
      </div>
    </sc-if>
  </main>

  <div aria-live="polite" style="position:fixed;inset-block-end:20px;inset-inline-end:20px;z-index:110;display:flex;flex-direction:column;gap:10px;width:min(340px,calc(100vw - 40px));pointer-events:none">
    <sc-for list="{{ toasts }}" as="t" hint-placeholder-count="0">
      <div style="display:flex;align-items:stretch;gap:12px;background:var(--elevated);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--e3);padding:13px 14px;animation:toastIn var(--dur-3) var(--ease-out);pointer-events:auto">
        <span style="width:4px;align-self:stretch;border-radius:var(--r-pill);background:var(--warn)"></span>
        <span style="flex:1;font-size:13px;color:var(--ink);align-self:center;line-height:1.4">{{ t.msg }}</span>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:900},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light'|'dark'&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;defaultLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;ar&quot;],&quot;default&quot;:&quot;en&quot;,&quot;tsType&quot;:&quot;'en'|'ar'&quot;,&quot;section&quot;:&quot;Theme&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state={ theme:(props&&props.defaultTheme)||'light', lang:(props&&props.defaultLang)||'en', ratings:{overall:0,comm:0,fair:0,resp:0}, text:'', workAgain:'yes', publicOn:true, submitted:false, toasts:[] };
    this._tid=0;
  }
  strings={
    en:{
      themeLabel:'Toggle light / dark', kicker:'Review · SS26 Desert Bloom',
      title:'How was working with Layla?', context:'Your review helps brands book with confidence. Rate the collaboration honestly across Fama’s three axes — it stays attached to this booking.',
      overall:'Overall experience',
      axes:[['comm','Communication','Briefs, updates, responsiveness'],['fair','Fairness','Rates, hours, and terms honoured'],['resp','Creative respect','Care for the work and the team']],
      writeLabel:'Your review', writePh:'Share what the collaboration was like…',
      workAgain:'Would you work again?', wYes:'Yes', wNo:'No', postPublic:'Post publicly',
      submit:'Submit review', disclaimer:'Reviews are tied to a completed booking and cannot be edited after 14 days.',
      thanksTitle:'Thank you', thanksBody:'Your review has been recorded and added to Layla’s creative passport. It helps keep Fama fair for everyone.',
      viewProfile:'View profile', editReview:'Edit review',
      needRating:'Please give an overall rating first.',
    },
    ar:{
      themeLabel:'تبديل الوضع الفاتح / الداكن', kicker:'تقييم · SS26 ازدهار الصحراء',
      title:'كيف كان التعاون مع ليلى؟', context:'يساعد تقييمك العلامات على الحجز بثقة. قيّم التعاون بصدق عبر محاور فاما الثلاثة — يبقى مرتبطًا بهذا الحجز.',
      overall:'التجربة العامة',
      axes:[['comm','التواصل','الموجزات والتحديثات وسرعة الرد'],['fair','الإنصاف','احترام الأجور والساعات والشروط'],['resp','الاحترام الإبداعي','العناية بالعمل وبالفريق']],
      writeLabel:'تقييمك', writePh:'شارك كيف كان التعاون…',
      workAgain:'هل ستتعاون مجددًا؟', wYes:'نعم', wNo:'لا', postPublic:'نشر علنًا',
      submit:'إرسال التقييم', disclaimer:'ترتبط التقييمات بحجز مكتمل ولا يمكن تعديلها بعد ١٤ يومًا.',
      thanksTitle:'شكرًا لك', thanksBody:'سُجّل تقييمك وأُضيف إلى جواز ليلى الإبداعي. هذا يحافظ على إنصاف فاما للجميع.',
      viewProfile:'عرض الملف', editReview:'تعديل التقييم',
      needRating:'يرجى منح تقييم عام أولًا.',
    }
  };
  toggleTheme=()=>this.setState(s=>({theme:s.theme==='dark'?'light':'dark'}));
  setEn=()=>this.setState({lang:'en'});
  setAr=()=>this.setState({lang:'ar'});
  setRating=(g,n)=>this.setState(s=>({ratings:{...s.ratings,[g]:n}}));
  onText=(e)=>this.setState({text:e.target.value});
  setWork=(v)=>this.setState({workAgain:v});
  togglePublic=()=>this.setState(s=>({publicOn:!s.publicOn}));
  submit=()=>{ if(this.state.ratings.overall===0){ const id=++this._tid; this.setState(s=>({toasts:[...s.toasts,{id,msg:this.strings[this.state.lang].needRating}]})); setTimeout(()=>this.setState(s=>({toasts:s.toasts.filter(t=>t.id!==id)})),3200); return; } this.setState({submitted:true}); };
  reset=()=>this.setState({submitted:false});

  starsFor(g){ const v=this.state.ratings[g]; return [1,2,3,4,5].map(n=>({n,onClick:()=>this.setRating(g,n),style:`color:${n<=v?'var(--gold)':'var(--line-strong)'}`})); }

  renderVals(){
    const st=this.state, isDark=st.theme==='dark', isAr=st.lang==='ar', isEn=!isAr;
    const s=this.strings[st.lang];
    const segOn='border:0;cursor:pointer;font-family:var(--font-ui);font-size:12px;font-weight:600;padding:5px 11px;border-radius:var(--r-pill);background:var(--ink);color:var(--on-primary)';
    const segOff='border:0;cursor:pointer;font-family:var(--font-ui);font-size:12px;font-weight:500;padding:5px 11px;border-radius:var(--r-pill);background:transparent;color:var(--muted)';
    const workItems=[['yes',s.wYes],['no',s.wNo]].map(([v,label])=>({v,label,onClick:()=>this.setWork(v),style:st.workAgain===v?segOn:segOff}));
    const on=st.publicOn;
    return {
      theme:st.theme, dir:isAr?'rtl':'ltr', isDark, isAr, isEn, s,
      enBtnStyle:isEn?segOn:segOff, arBtnStyle:isAr?segOn:segOff,
      toggleTheme:this.toggleTheme, setEn:this.setEn, setAr:this.setAr,
      overallStars:this.starsFor('overall'),
      axisGroups:s.axes.map(a=>({key:a[0],label:a[1],note:a[2],stars:this.starsFor(a[0])})),
      text:st.text, onText:this.onText,
      workItems, publicOn:on, togglePublic:this.togglePublic,
      switchTrackStyle:`width:42px;height:24px;border-radius:var(--r-pill);border:0;cursor:pointer;padding:3px;display:flex;justify-content:${on?'flex-end':'flex-start'};background:${on?'var(--accent)':'var(--line-strong)'}`,
      switchKnobStyle:'width:18px;height:18px;border-radius:var(--r-pill);background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.3)',
      submit:this.submit, reset:this.reset, submitted:st.submitted, notSubmitted:!st.submitted,
      toasts:st.toasts,
    };
  }
}
</script>
</body>
</html>
